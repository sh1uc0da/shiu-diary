<div class="stage" id="root" style="background:#2c2118;">

<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="admin.jsx"></script>

<!-- 掛載 -->
<script type="text/babel">
  function Backstage() {
    const back = () => { window.location.href = "%E8%A9%A9%E9%9B%A8%E5%9C%8B%E6%97%A5%E8%A8%98.html"; };

      <div className="stage" style={{ background: "#2c2118" }}>

          <AdminApp onExit={back} />

  ReactDOM.createRoot(document.getElementById("root")).render(<Backstage />);
